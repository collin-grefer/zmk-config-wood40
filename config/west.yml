manifest:
  defaults:
    revision: v0.3-branch
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: inorichi
      url-base: https://github.com/inorichi
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: inorichi
      # pin this to a known-working commit SHA once confirmed
      revision: main
  self:
    path: config
